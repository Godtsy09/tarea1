<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos del Usuario</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #7aa06d, #8aa16f, #d3ffb0);
            padding: 20px;
        }

        /* CONTENEDOR */
        .contenedor {
            width: 100%;
            max-width: 420px;
        }

        /* TARJETA */
        .tarjeta {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 26px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            padding: 40px 32px;
            text-align: center;
            animation: aparecer 0.7s ease;
            border: 1px solid rgba(138, 161, 111, 0.25);
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* TITULO */
        .titulo {
            font-size: 32px;
            color: #2f4f2f;
            margin-bottom: 8px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* SUBTITULO */
        .subtitulo {
            font-size: 15px;
            color: #5c6b5c;
            margin-bottom: 25px;
        }

        /* BLOQUE DE DATOS */
        .dato {
            background: #f6faf4;
            border: 1px solid #cfe3c6;
            border-radius: 18px;
            padding: 16px 20px;
            text-align: left;
            margin-bottom: 16px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .dato:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(138, 161, 111, 0.15);
            background: #ffffff;
        }

        /* ETIQUETAS */
        .etiqueta {
            display: block;
            font-size: 12px;
            color: #2f4f2f;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
        }

        /* VALORES */
        .valor {
            font-size: 18px;
            font-weight: 600;
            color: #4a7c59;
        }

        /* LISTA DE HABILIDADES */
        .lista {
            list-style: none;
            padding-left: 0;
            margin-top: 5px;
        }

        .lista li {
            font-size: 16px;
            color: #4a7c59;
            font-weight: 600;
            padding: 4px 0;
            display: flex;
            align-items: center;
        }

        /* Pequeño indicador para la lista */
        .lista li::before {
            content: "•";
            color: #8aa16f;
            font-weight: bold;
            display: inline-block;
            width: 1em;
            margin-left: 2px;
        }

        /* BOTON (Gris oscuro elegante) */
        .boton {
            display: block;
            width: 85%;
            margin: 10px auto 0 auto;
            padding: 14px 20px;
            border-radius: 14px;
            text-decoration: none;
            background: linear-gradient(135deg, #6b7280, #374151);
            color: white;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.25s ease;
            box-shadow: 0 10px 25px rgba(55, 65, 81, 0.25);
            text-align: center;
        }

        .boton:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(55, 65, 81, 0.35);
        }

        .boton:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            .tarjeta {
                padding: 32px 24px;
            }
            .titulo {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="tarjeta">
        <h1 class="titulo">Datos Personales</h1>
        <p class="subtitulo">Información detallada desde Thymeleaf</p>

        <div class="dato">
            <span class="etiqueta">Nombre</span>
            <span class="valor" th:text="${Nombre}">Jefferson Juárez</span>
        </div>

        <div class="dato">
            <span class="etiqueta">Edad</span>
            <span class="valor" th:text="${Edad}">18 años</span>
        </div>

        <div class="dato">
            <span class="etiqueta">Habilidades</span>
            <ul class="lista">
                <li th:each="hab : ${Habilidades}" th:text="${hab}">Java & Spring Boot</li>
            </ul>
        </div>

        <a class="boton" th:href="@{/home}">Regresar al menu</a>
    </div>
</div>

</body>
</html>
