<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #7aa06d, #8aa16f, #d3ffb0);
            padding: 20px;
        }

        /* CONTENEDOR ESTÁNDAR (Igual al Login) */
        .contenedor {
            width: 100%;
            max-width: 420px;
        }

        /* TARJETA */
        .tarjeta {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 26px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            padding: 38px 32px;
            text-align: center;
            animation: aparecer 0.7s ease;
            border: 1px solid rgba(138, 161, 111, 0.25);
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .titulo {
            font-size: 32px;
            color: #2f4f2f;
            margin-bottom: 25px;
            font-weight: 800;
        }

        /* MENSAJE DE ERROR */
        .error {
            background: #fde8e8;
            color: #8b2c2c;
            border: 1px solid #f5c2c2;
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        /* CAMPOS */
        .campo {
            margin-bottom: 18px;
            text-align: left;
        }

        .campo label {
            display: block;
            font-size: 12px;
            color: #2f4f2f;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
        }

        .campo input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cfe3c6;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            background: #f6faf4;
            transition: all 0.25s ease;
        }

        .campo input:focus {
            border-color: #8aa16f;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(138, 161, 111, 0.15);
        }

        /* BOTÓN REGISTRARSE (Mismo estilo que el botón Ingresar) */
        .boton {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #6b7280, #374151);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 25px rgba(55, 65, 81, 0.25);
            margin-top: 10px;
        }

        .boton:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(55, 65, 81, 0.35);
        }

        /* LINK VOLVER */
        .link-volver {
            display: block;
            margin-top: 25px;
            font-size: 14px;
            color: #5c6b5c;
            text-decoration: none;
        }

        .link-volver a {
            color: #4a7c59;
            text-decoration: none;
            font-weight: 700;
        }

        .link-volver a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="tarjeta">
        <h1 class="titulo">Registrarse</h1>

        <div th:if="${param.usernameExist}" class="error">
            Ese nombre de usuario ya está en uso.
        </div>

        <form th:action="@{/register}" method="post">
            <div class="campo">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Ingrese su usuario" required>
            </div>

            <div class="campo">
                <label for="password">Contrasena</label>
                <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit" class="boton">Crear Usuario</button>
        </form>

        <div class="link-volver">
            ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión aquí</a>
        </div>
    </div>
</div>

</body>
</html>
